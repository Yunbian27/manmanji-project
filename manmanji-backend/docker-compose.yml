version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: manmanji-db
    environment:
      POSTGRES_DB: manmanji
      POSTGRES_USER: manmanji
      POSTGRES_PASSWORD: manmanji123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manmanji"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: manmanji-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
