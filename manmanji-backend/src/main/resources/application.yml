server:
  port: 8080

spring:
  application:
    name: manmanji-backend
  profiles:
    active: dev

  # 数据库初始化
  sql:
    init:
      mode: never #项目第一次执行之后将always改为never
      schema-locations: classpath:schema.sql
      #data-locations: classpath:data.sql

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Spring AI 配置（chat + embedding 统一由 app.ai.providers 驱动，不使用自动配置）
  ai:
    # 禁用自动重试机制，让异常立即返回
    retry:
      max-attempts: 1  # 不重试，失败立即返回
      on-client-errors: false
    # PostgreSQL Vector Store配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024  # text-embedding-v3实际生成的向量维度
        initialize-schema: true # 开发环境设置为 true，方便快速启动。生产环境设置为 false，手动管理数据库 schema，避免意外变更。
        remove-existing-vector-store-table: false  # 保留现有表和数据

  # PostgreSQL数据库配置
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:manmanji}
    username: ${POSTGRES_USER:postgres}
    # 与根目录 docker-compose.yml 中 postgres 服务默认一致（本地只起依赖容器 + bootRun 时无需改）
    password: ${POSTGRES_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  # Redisson配置 (使用 spring.redis.redisson，参考官方文档)
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
          database: 0
          connectionMinimumIdleSize: 10
          connectionPoolSize: 64
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50

# JWT 配置
jwt:
  private-key-path: classpath:keys/rsa_private.pem
  public-key-path: classpath:keys/rsa_public.pem
  access-token-expire: 900000000000        # 15 分钟(900)
  refresh-token-expire: 604800    # 7 天

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yunbian27
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# ai 配置
ai:
  default-provider: dashscope
  default-embedding-provider: dashscope
  embedding-dimensions: ${APP_AI_EMBEDDING_DIMENSIONS:1024}
  security:
    api-key-encryption-key: ${APP_AI_CONFIG_ENCRYPTION_KEY:}
    require-encryption-key: ${APP_AI_CONFIG_REQUIRE_ENCRYPTION_KEY:false}
  # 运行时可写的 Provider 配置落点（与 classpath 主 application.yml 隔离）。
  # 开发环境默认写到用户主目录下，避免污染源码目录或 jar 内 classpath 资源。
  config-yaml-path: ${APP_AI_CONFIG_YAML_PATH:${user.home}/.manmanji/llm-providers.yml}
  config-env-path: ${APP_AI_CONFIG_ENV_PATH:${user.home}/.manmanji/llm-providers.env}
  agent-utils:
    skills-root: ${APP_AI_AGENT_UTILS_SKILLS_ROOT:classpath:skills}
  providers:
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_BAILIAN_API_KEY}
      model: ${AI_MODEL:qwen3.5-flash}
      embedding-model: text-embedding-v3
      embedding-dimensions: 1024
      supports-embedding: true
    lmstudio:
      base-url: http://localhost:1234
      api-key: ${PROVIDER_LMSTUDIO_API_KEY:lm-studio}
      model: qwen2.5-7b-instruct
      supports-embedding: false
    # ===== 预设 Provider（填完 API Key 后即可使用）=====
    # Moonshot AI / Kimi（OpenAI 兼容） https://platform.moonshot.cn/
    kimi:
      base-url: https://api.moonshot.cn/v1
      api-key: ${PROVIDER_KIMI_API_KEY:}
      model: ${PROVIDER_KIMI_MODEL:kimi-latest}
      temperature: 1
      supports-embedding: false
    # DeepSeek（OpenAI 兼容） https://api-docs.deepseek.com/
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${PROVIDER_DEEPSEEK_API_KEY:}
      model: ${PROVIDER_DEEPSEEK_MODEL:deepseek-v4-flash}
      supports-embedding: false
    # 智谱 AI / GLM（OpenAI 兼容） https://open.bigmodel.cn/
    glm:
      base-url: https://open.bigmodel.cn/api/coding/paas/v4
      api-key: ${PROVIDER_GLM_API_KEY:}
      model: ${PROVIDER_GLM_MODEL:glm-5}
      embedding-model: embedding-3
      embedding-dimensions: 1024
      supports-embedding: true
  advisors:
    enabled: ${APP_AI_ADVISORS_ENABLED:true}
    tool-call-enabled: ${APP_AI_ADVISORS_TOOL_CALL_ENABLED:true}
    tool-call-conversation-history-enabled: ${APP_AI_ADVISORS_TOOL_CALL_CONVERSATION_HISTORY_ENABLED:false}
    stream-tool-call-responses: ${APP_AI_ADVISORS_STREAM_TOOL_CALL_RESPONSES:false}
    message-chat-memory-enabled: ${APP_AI_ADVISORS_MESSAGE_CHAT_MEMORY_ENABLED:false}
    message-chat-memory-max-messages: ${APP_AI_ADVISORS_MESSAGE_CHAT_MEMORY_MAX_MESSAGES:120}
    simple-logger-enabled: ${APP_AI_ADVISORS_SIMPLE_LOGGER_ENABLED:false}

# SpringDoc OpenAPI / Swagger配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.yunbian27

# 日志
logging:
  level:
    com.yunbian27: debug
    org.springframework.security: debug


# 积分配置
points:
  check-in: 10              # 签到 +10
  read-article: 1           # 阅读 +1
  like: 2                   # 点赞 +2
  comment: 3                # 评论 +3
  daily-limits:
    read: 10                # 每日阅读上限
    like: 5                 # 每日点赞上限
    comment: 10             # 每日评论上限
  exchange:
    ai-quota-cost: 100      # 100 积分兑换 1 次 AI 对话

# 排行配置
ranking:
  cron: "0 */10 * * * *"    # 每 10 分钟更新热榜
  formula:
    view-weight: 1
    like-weight: 5
    comment-weight: 10
    bookmark-weight: 3


