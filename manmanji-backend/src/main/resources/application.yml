server:
  port: 8080
spring:
  application:
    name: manmanji-backend
  profiles:
    active: dev
  autoconfigure:
    exclude:
      # DeepSeek 不支持的模块
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  # 数据库初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  private-key-path: classpath:keys/rsa_private.pem
  public-key-path: classpath:keys/rsa_public.pem
  access-token-expire: 900        # 15 分钟
  refresh-token-expire: 604800    # 7 天

# AI 模型配置
ai:
  default:
    provider: deepseek
    model: deepseek-chat
  embedding:
    provider: openai      # DeepSeek 不支持嵌入模型，暂用 OpenAI
    model: text-embedding-3-small
    dimension: 1536

# 积分配置
points:
  check-in: 10              # 签到 +10
  read-article: 1           # 阅读 +1
  like: 2                   # 点赞 +2
  comment: 3                # 评论 +3
  daily-limits:
    read: 10                # 每日阅读上限
    like: 5                 # 每日点赞上限
    comment: 10             # 每日评论上限
  exchange:
    ai-quota-cost: 100      # 100 积分兑换 1 次 AI 对话

# 排行配置
ranking:
  cron: "0 */10 * * * *"    # 每 10 分钟更新热榜
  formula:
    view-weight: 1
    like-weight: 5
    comment-weight: 10
    bookmark-weight: 3

# 日志
logging:
  level:
    com.yunbian27: debug
    org.springframework.security: debug
